services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    image: ghcr.io/aaronpowell/chatterbox-selfhost:cpu
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./audio:/app/audio
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - redis

  worker:
    image: ghcr.io/aaronpowell/chatterbox-selfhost:cpu
    env_file:
      - .env
    command: ["python", "-m", "worker.worker"]
    volumes:
      - ./audio:/app/audio
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - redis

